features:
- name: Semantic and Calendar Versioning
  description: Established conventions like SemVer (MAJOR.MINOR.PATCH) and CalVer
    (YYYY.MM) give API and library producers a shared vocabulary for communicating
    compatibility and release cadence to consumers.
- name: Breaking Change Detection
  description: Spec-diff tools like oasdiff, openapi-diff, Optic, and GraphQL Inspector
    compare two versions of an API specification and classify changes as breaking,
    non-breaking, or unclassified before they ship to production.
- name: Schema Registries and Evolution
  description: Platforms like Apicurio, Confluent Schema Registry, Buf Schema Registry,
    and Apollo GraphOS track every version of a schema, enforce compatibility rules
    (backward, forward, full), and prevent incompatible deploys.
- name: API Version Headers and Date-Based Versioning
  description: Providers like Stripe and GitHub pin requests to a version via a header
    or date string, allowing the platform to ship new API behavior without breaking
    existing integrations.
- name: Deprecation and Sunsetting
  description: The Deprecation and Sunset HTTP headers (RFC 8594 / RFC 9745) and platform-level
    deprecation policies give consumers structured advance notice that an endpoint
    or version is going away.
- name: Documentation and Changelog Versioning
  description: Tools like Bump.sh, Stoplight, Scalar, LaunchNotes, and Keep a Changelog
    publish per-version API references and human-readable release notes alongside
    the underlying spec or code change.
- name: Conventional Commits and Release Automation
  description: The Conventional Commits specification encodes change type (feat, fix,
    BREAKING CHANGE) directly in commit messages so that SemVer bumps and changelogs
    can be generated automatically.
- name: Dependency Version Management
  description: Bots like Dependabot and Renovate continuously open pull requests to
    upgrade dependencies, respecting SemVer ranges and surfacing breaking changes
    upstream.
use_cases:
- name: Pre-Merge Breaking Change Gate
  description: Run oasdiff or Optic in CI on every pull request that touches the OpenAPI
    spec and block the merge if breaking changes are introduced without an explicit
    major version bump.
- name: Date-Pinned API Versions
  description: Issue per-account or per-request API versions (e.g. Stripe's 2024-04-10
    versioning) so customer integrations remain stable while the platform iterates
    rapidly behind the scenes.
- name: Schema Registry Compatibility Enforcement
  description: Producers and consumers of Kafka, gRPC, or GraphQL schemas register
    every revision in Apicurio, Confluent, Buf, or Apollo and the registry refuses
    incompatible changes at publish time.
- name: Multi-Version API Documentation
  description: Publish v1, v2, and v3 documentation simultaneously through Bump.sh,
    Stoplight, or Scalar so consumers on older versions still have authoritative reference
    material.
- name: Deprecation and Sunset Notification
  description: Emit Deprecation and Sunset HTTP headers from deprecated endpoints,
    then track consumer migration through analytics before fully removing the version.
- name: Automated SemVer Release
  description: Use Conventional Commits plus tools like semantic-release to compute
    the next SemVer version, generate a changelog, tag the repo, and publish a release
    entirely from commit history.
- name: Continuous Dependency Upgrades
  description: Configure Dependabot or Renovate to open weekly PRs for dependency
    upgrades, with SemVer-aware grouping and automatic merge for non-breaking patches.
- name: API Changelog and Release Notes
  description: Publish a structured changelog through LaunchNotes, Beamer, or Keep
    a Changelog conventions so consumers can review what changed in every API release.
integrations:
- name: Oasdiff
  description: Open-source CLI and library that compares two OpenAPI specifications
    and classifies every change as breaking or non-breaking, with rule-level configuration.
- name: Optic
  description: API change-management platform that captures real traffic, generates
    OpenAPI, and gates pull requests on breaking changes against the existing spec.
- name: Bump.sh
  description: API documentation and changelog platform that publishes per-version
    OpenAPI and AsyncAPI references and surfaces diffs between releases.
- name: Buf
  description: Buf Schema Registry and CLI for Protocol Buffers, with first-class
    breaking-change detection and lint rules across proto versions.
- name: Apollo GraphQL
  description: Apollo GraphOS schema registry and Apollo Studio check every proposed
    GraphQL schema change against operations from real clients before publication.
- name: Apicurio
  description: Open-source schema registry from Red Hat for Avro, JSON Schema, OpenAPI,
    AsyncAPI, and Protobuf, with pluggable compatibility rules.
- name: Stripe
  description: Stripe's date-based API versioning model pins every integration to
    a release date and provides a Versioning Stripe API reference for upgrading between
    versions.
- name: Dependabot
  description: GitHub-native dependency-update automation that opens PRs for upgrades,
    respecting SemVer ranges and security advisories.
- name: Renovate
  description: Configurable dependency upgrade bot with SemVer-aware grouping, scheduling,
    and automerge across npm, Maven, Docker, and many other ecosystems.
- name: Sunset Header
  description: Standard HTTP response header (RFC 8594) for communicating the date
    at which a resource will become unavailable, used together with Deprecation (RFC
    9745).
